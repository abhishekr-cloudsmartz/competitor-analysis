name: Daily Competitive Brief

on:
  schedule:
    # 10:00 AM IST = 04:30 UTC  (IST is UTC+5:30)
    - cron: "30 4 * * *"
  workflow_dispatch:  # Manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests google-generativeai anthropic

      - name: Run daily brief
        env:
          # Gemini is the default free provider for scheduled runs.
          # If GEMINI_API_KEY is absent but ANTHROPIC_API_KEY is set, falls back to Claude API.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/daily_brief.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet \
            && echo "No changes to commit (brief already ran today)" \
            || git commit -m "Daily brief $(date -u +%Y-%m-%d)"
          git push
